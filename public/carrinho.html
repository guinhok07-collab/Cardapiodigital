<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Carrinho — Point do Roger</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="page-carrinho">
  <header class="bar-top">
    <nav class="top-menu top-menu--subpage" aria-label="Menu principal">
      <a href="index.html">Início</a>
      <a href="index.html#cardapio">Cardápio</a>
      <a href="carrinho.html" aria-current="page">Carrinho</a>
    </nav>
    <div class="bar-row-actions">
      <a class="back-link" href="index.html">← Cardápio</a>
    </div>
    <h1 class="page-title">Carrinho</h1>
  </header>

  <main class="main narrow">
    <div id="empty-cart" class="empty-cart hidden">
      <p>Carrinho vazio.</p>
      <a class="btn-link" href="index.html">Ver cardápio</a>
    </div>

    <div id="cart-content" class="hidden">
      <div id="cart-lines"></div>

      <section id="payment-hints" class="payment-hints hidden" aria-label="Dados para pagamento">
        <h3 class="payment-hints-title">Pagamento antecipado</h3>
        <div id="pix-hint-block" class="payment-pix hidden">
          <p class="payment-pix-label">PIX</p>
          <p id="pix-holder-line" class="payment-pix-holder muted hidden"></p>
          <div class="pix-key-row">
            <code id="pix-key-display" class="pix-key-code"></code>
            <button type="button" class="btn-copy-pix" id="btn-copy-pix">Copiar chave</button>
          </div>
          <p id="pix-copy-feedback" class="pix-copy-feedback hidden" role="status"></p>
          <img id="pix-qr-img" class="pix-qr-img hidden" alt="QR Code para PIX" width="200" height="200" loading="lazy" decoding="async" />
        </div>
        <div id="card-hint-block" class="payment-card-hint hidden">
          <p class="payment-card-label">Cartão (online)</p>
          <a id="card-pay-link" class="btn-payment-link" href="#" target="_blank" rel="noopener noreferrer">Abrir pagamento com cartão</a>
          <p class="muted small">Página segura do Mercado Pago, Stripe ou outro link que configurares.</p>
        </div>
        <p id="payment-note-hint" class="payment-note-hint muted small hidden"></p>
      </section>

      <section class="checkout-card">
        <h2>Finalizar pedido</h2>
        <form id="checkout-form">
          <label>Nome *<input type="text" name="name" required autocomplete="name" /></label>
          <label>WhatsApp *<input type="tel" name="phone" required autocomplete="tel" /></label>
          <label>Endereço *<textarea name="address" required rows="3"></textarea></label>
          <fieldset class="pay-fieldset">
            <legend>Forma de pagamento *</legend>
            <label id="pay-label-pix"><input type="radio" name="payment" value="PIX" required /> PIX (transferência)</label>
            <label id="pay-label-card-online" class="hidden"><input type="radio" name="payment" value="Cartão online" /> Cartão online (link)</label>
            <label><input type="radio" name="payment" value="Cartão na entrega" /> Cartão na entrega</label>
            <label><input type="radio" name="payment" value="Dinheiro" /> Dinheiro</label>
          </fieldset>
          <label>Observações<textarea name="notes" rows="2"></textarea></label>
          <p class="total-row">Total: <strong id="cart-total">R$ 0,00</strong></p>
          <button type="submit" class="btn-wa-send">Enviar pedido no WhatsApp</button>
        </form>
      </section>
    </div>
  </main>

  <script src="js/carrinho.js" type="module"></script>
</body>
</html>
