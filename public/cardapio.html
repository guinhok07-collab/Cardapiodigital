<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Cardápio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="page-cardapio page-cardapio--clean has-app-tabbar">
  <div id="cardapio-hero-strip" class="cardapio-hero-strip is-hidden" aria-hidden="true"></div>
  <header class="cardapio-bar">
    <div class="cardapio-bar-inner">
      <a class="cardapio-bar-back" href="index.html">← Voltar</a>
      <a class="cardapio-bar-cart" href="carrinho.html">
        <span aria-hidden="true">🛒</span>
        <span>Carrinho</span>
        <span class="cart-badge is-empty" id="cart-badge">0</span>
      </a>
    </div>
    <div class="cardapio-bar-head">
      <span id="cat-emoji" class="cardapio-cat-emoji" aria-hidden="true"></span>
      <h1 id="cat-title" class="cardapio-cat-title">Categoria</h1>
    </div>
    <p id="cat-subtitle" class="cardapio-cat-subtitle" hidden></p>
  </header>

  <main class="main narrow cardapio-main">
    <div id="items-root" class="items-list"></div>
  </main>

  <a class="home-fab" href="carrinho.html" data-cart-fab hidden>
    <span aria-hidden="true">🛒</span> Carrinho <span class="home-fab-count" data-cart-fab-count>0</span>
  </a>

  <footer class="site-footer cardapio-site-footer">
    <p class="footnote">Point do Roger</p>
  </footer>

  <nav class="app-tabbar" aria-label="Menu do app">
    <a href="index.html" class="app-tab">
      <span class="app-tab-icon" aria-hidden="true">🏠</span>
      <span class="app-tab-label">Início</span>
    </a>
    <a href="index.html#cardapio" class="app-tab" aria-current="page">
      <span class="app-tab-icon" aria-hidden="true">📋</span>
      <span class="app-tab-label">Cardápio</span>
    </a>
    <a href="carrinho.html" class="app-tab app-tab--cart">
      <span class="app-tab-icon-wrap">
        <span class="app-tab-icon" aria-hidden="true">🛒</span>
        <span class="cart-badge is-empty">0</span>
      </span>
      <span class="app-tab-label">Carrinho</span>
    </a>
  </nav>

  <script src="js/cardapio.js" type="module"></script>
</body>
</html>
