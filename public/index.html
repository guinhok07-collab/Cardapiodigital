<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cardápio Digital</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="page-home page-home--clean">
  <header class="home-bar">
    <div class="home-bar-inner">
      <a href="index.html" class="home-bar-brand" id="top-brand-link">
        <img id="top-brand-logo" class="home-bar-logo hidden" alt="" decoding="async" />
        <span id="top-brand" class="home-bar-title">Cardápio</span>
      </a>
      <a class="home-bar-cart" href="carrinho.html">
        <span aria-hidden="true">🛒</span>
        <span>Carrinho</span>
        <span class="cart-badge is-empty" id="cart-badge">0</span>
      </a>
    </div>
  </header>

  <main class="home-main" id="cardapio">
    <div class="home-bg" id="home-hero-bg" aria-hidden="true"></div>
    <div class="home-content">
      <header class="home-intro">
        <h1 id="store-name" class="home-intro-name">Cardápio Digital</h1>
        <p id="headline" class="home-intro-lead"></p>
        <p id="subhead" class="home-intro-sub hidden"></p>
      </header>

      <p class="home-section-label">Categorias</p>
      <div id="category-grid" class="home-cat-list"></div>
    </div>
  </main>

  <a class="home-fab" href="carrinho.html" data-cart-fab hidden>
    <span aria-hidden="true">🛒</span> Carrinho <span class="home-fab-count" data-cart-fab-count>0</span>
  </a>

  <footer class="home-footer">
    <p id="footer-address" class="footer-address hidden"></p>
    <p class="home-foot-note">Cardápio Digital</p>
  </footer>

  <script src="js/home.js" type="module"></script>
</body>
</html>
