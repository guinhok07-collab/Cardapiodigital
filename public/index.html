<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cardápio Digital</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="page-home">
  <header class="top-bar">
    <div class="top-bar-inner">
      <span class="top-bar-brand" id="top-brand">Cardápio</span>
      <a class="cart-link" href="carrinho.html">
        <span aria-hidden="true">🛒</span> Carrinho
        <span class="cart-badge is-empty" id="cart-badge">0</span>
      </a>
    </div>
  </header>

  <header class="hero hero-compact">
    <h1 id="store-name" class="store-name">Cardápio Digital</h1>
    <p id="headline" class="headline">Monte seu pedido</p>
    <p id="subhead" class="subhead"></p>
    <ol class="steps-hint">
      <li><span>1</span> Categoria</li>
      <li><span>2</span> Itens</li>
      <li><span>3</span> Carrinho</li>
      <li><span>4</span> WhatsApp</li>
    </ol>
  </header>

  <main class="main">
    <h2 class="section-title">Cardápio</h2>
    <p class="section-lead">Toque para ver itens e preços.</p>
    <div id="category-grid" class="category-grid"></div>
  </main>

  <section id="hero-bottom-wrap" class="hero-bottom-wrap hidden" aria-hidden="true">
    <img id="hero-img" class="hero-img-bottom" src="" alt="" loading="lazy" />
  </section>

  <a class="cart-fab" href="carrinho.html" data-cart-fab hidden>
    <span aria-hidden="true">🛒</span> Carrinho <strong data-cart-fab-count>0</strong>
  </a>

  <footer class="site-footer">
    <p id="footer-address" class="footer-address hidden"></p>
    <p class="footnote">Cardápio Digital</p>
    <p class="admin-link"><a href="admin/index.html">Admin</a></p>
  </footer>

  <script src="js/home.js" type="module"></script>
</body>
</html>
